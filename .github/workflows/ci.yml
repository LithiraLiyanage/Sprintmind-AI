name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @sprintmind/web
      - run: npm run typecheck --workspace @sprintmind/web
      - run: npm run test --workspace @sprintmind/web
      - run: npm run build --workspace @sprintmind/web

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sprintmind
          POSTGRES_PASSWORD: sprintmind
          POSTGRES_DB: sprintmind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r apps/api/requirements-dev.txt
      - run: python -m ruff check apps/api/app apps/api/tests
      - run: python -m mypy apps/api/app
      - run: cd apps/api && alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://sprintmind:sprintmind@localhost:5432/sprintmind
      - run: python -m pytest apps/api/tests

