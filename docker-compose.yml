services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sprintmind
      POSTGRES_PASSWORD: sprintmind
      POSTGRES_DB: sprintmind
    ports:
      - "5432:5432"
    volumes:
      - sprintmind-postgres:/var/lib/postgresql/data
      - ./infrastructure/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintmind -d sprintmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    env_file: .env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    volumes:
      - ./apps/api:/app
    depends_on:
      - api
      - redis

  scheduler:
    build:
      context: ./apps/api
    env_file: .env
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    volumes:
      - ./apps/api:/app
    depends_on:
      - worker

  web:
    build:
      context: ./apps/web
    env_file: .env
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  sprintmind-postgres:

